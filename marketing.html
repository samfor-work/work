<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026 6月行銷活動工作台</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #617083;
      --quiet: #8b96a5;
      --line: #d8e0ea;
      --line-strong: #a9b8c8;
      --panel: #ffffff;
      --surface: #ffffff;
      --bg: #f5f7fa;
      --accent: #1f5f99;
      --accent-soft: #e7f1fb;
      --label: #d8f000;
      --green: #18745b;
      --green-soft: #dff3ea;
      --amber: #b65f00;
      --amber-soft: #ffe7c7;
      --red: #b42318;
      --red-soft: #fde4e2;
      --grid: rgba(31, 95, 153, .05);
      --shadow: 0 18px 48px rgba(24, 39, 56, .10);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        linear-gradient(0deg, rgba(31, 95, 153, .04) 1px, transparent 1px),
        var(--bg);
      background-size: 34px 34px;
      color: var(--ink);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      letter-spacing: 0;
    }

    .home-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255, 255, 255, .92);
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 8px 24px rgba(24, 39, 56, .10);
    }

    .home-link:hover {
      border-color: var(--ink);
    }

    .shell {
      width: min(1280px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 72px 0 44px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto;
      align-items: end;
      gap: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--ink);
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1;
      font-weight: 900;
    }

    .stamp {
      min-width: 150px;
      padding: 10px 12px;
      background: var(--panel);
      border: 2px solid var(--ink);
      box-shadow: 5px 5px 0 var(--ink);
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 9px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(255,255,255,.7);
      white-space: nowrap;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      margin: 16px 0 18px;
      padding: 10px;
      background: rgba(245,247,250,.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 22px rgba(27,30,33,.05);
    }

    .search {
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: center;
      min-height: 42px;
      padding: 0 12px;
      background: var(--surface);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
    }

    .search span { color: var(--muted); font-weight: 800; }
    input[type="search"] {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: 15px;
    }

    .segments {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: #eef3f8;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    button {
      min-height: 34px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    button.segment {
      padding: 0 10px;
      white-space: nowrap;
    }

    button.segment.active {
      background: var(--surface);
      border-color: var(--line-strong);
      box-shadow: 0 4px 12px rgba(27,30,33,.06);
    }

    .ghost-btn {
      padding: 0 12px;
      background: var(--ink);
      color: white;
      border-color: var(--ink);
    }

    .overview {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .metric {
      min-height: 84px;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .metric strong {
      display: block;
      font-size: 26px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .group-nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 14px;
      scrollbar-width: thin;
    }

    .group-chip {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 10px;
      color: var(--ink);
      text-decoration: none;
      background: rgba(255,255,255,.78);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
    }

    .group-chip b {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      color: white;
      background: var(--chip-color, var(--ink));
      border-radius: 999px;
      font-size: 12px;
    }

    .group {
      margin-top: 22px;
      border-top: 4px solid var(--group-color);
      scroll-margin-top: 88px;
    }

    .group-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      padding: 12px 0 10px;
      border-bottom: 1px solid var(--line-strong);
    }

    .group-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .group-title h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 900;
    }

    .group-title span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding-top: 10px;
    }

    .activity-card {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-height: 232px;
      padding: 13px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 5px solid var(--group-color);
      border-radius: var(--radius);
      box-shadow: 0 10px 28px rgba(27,30,33,.06);
    }

    .card-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      margin-bottom: 8px;
    }

    .card-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 900;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: #f7fafc;
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.changed {
      color: var(--red);
      border-color: #f0aaa4;
      background: #fff3c9;
    }

    .badge.new {
      color: #111500;
      border-color: #c7df00;
      background: var(--label);
    }

    .badge.long { color: var(--green); background: var(--green-soft); border-color: #a7d5c4; }
    .badge.stock { color: var(--amber); background: var(--amber-soft); border-color: #ecc086; }

    .activity-card.new-item {
      border-color: #c7df00;
      border-left-color: #d8f000;
      background:
        linear-gradient(135deg, rgba(216, 240, 0, .22), transparent 42%),
        var(--surface);
    }

    .subline {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
      min-height: 18px;
      margin-bottom: 9px;
    }

    .content {
      margin: 0;
      white-space: pre-line;
      font-size: 13px;
      line-height: 1.52;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .field {
      min-width: 0;
      padding: 8px;
      background: #f7fafc;
      border: 1px solid #e8edf2;
      border-radius: 6px;
    }

    .field.wide { grid-column: 1 / -1; }
    .label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }
    .value {
      display: block;
      overflow-wrap: anywhere;
      white-space: pre-line;
      font-size: 12px;
      line-height: 1.45;
      font-weight: 700;
    }

    .empty-state {
      margin: 26px 0;
      padding: 24px;
      background: var(--surface);
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    .hidden { display: none !important; }

    @media (max-width: 1120px) {
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .overview { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr; }
      .segments { overflow-x: auto; }
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100% - 20px, 1280px);
        padding-top: 62px;
      }
      .topbar { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
      .overview { grid-template-columns: 1fr; }
      .cards { grid-template-columns: 1fr; }
      .fields { grid-template-columns: 1fr; }
      .toolbar {
        top: 0;
        margin-left: -2px;
        margin-right: -2px;
      }
    }

    @media print {
      body { background: white; }
      .toolbar, .group-nav, .ghost-btn { display: none !important; }
      .shell { width: 100%; padding: 0; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .activity-card { break-inside: avoid; box-shadow: none; }
    }
  </style>
</head>

    const GROUPS = [{"id": "iphone", "title": "iPhone 主機", "accent": "#c43c2f", "keywords": ["iphone", "iPhone Air", "iPhone 17e", "iPhone 16"]}, {"id": "ipad", "title": "iPad 主機", "accent": "#39796b", "keywords": ["ipad", "iPad"]}, {"id": "mac", "title": "Mac 主機", "accent": "#4147a3", "keywords": ["mac", "Mac", "MacBook", "iMac", "Mac mini", "Mac Studio", "Studio Display", "電腦配件活動", "Mac 配件套餐"]}, {"id": "watch", "title": "Apple Watch", "accent": "#7b5b2b", "keywords": ["watch", "Watch", "Apple Watch"]}, {"id": "airpods", "title": "AirPods", "accent": "#2d6a9f", "keywords": ["airpods", "AirPods", "Headphones"]}, {"id": "accessory", "title": "週邊配件與套組", "accent": "#b24573", "keywords": ["週邊", "配件", "Momax", "PQI", "VAP", "BON TON", "AirTag", "eSIM", "原廠周邊"]}, {"id": "software", "title": "軟體與系統", "accent": "#5b6b21", "keywords": ["軟體", "Office", "Windows", "Parallels"]}, {"id": "payment", "title": "付款與信用卡", "accent": "#8f4c18", "keywords": ["信用卡", "LINE Pay", "電子支付", "中租", "分期", "收單"]}, {"id": "tradein", "title": "舊換新", "accent": "#4d6f7a", "keywords": ["舊換新", "盤舊換新"]}, {"id": "policy", "title": "門市政策與耗材", "accent": "#636363", "keywords": ["塑膠袋", "紙袋", "環保限塑", "收費"]}, {"id": "enterprise", "title": "企業與員工優惠", "accent": "#6b4b8a", "keywords": ["員工優惠", "星宇", "工研院", "正崴", "異業結盟"]}, {"id": "care", "title": "SA Care 與保固", "accent": "#9d3748", "keywords": ["SA Care", "SACare", "保固", "檢測新機", "續保"]}, {"id": "other", "title": "其他活動", "accent": "#5a6270", "keywords": []}];

    const state = {
      query: '',
      status: 'all',
      density: 'normal'
    };

    const groupById = Object.fromEntries(GROUPS.map(group => [group.id, group]));
    const fields = ['大類', '項目', '活動/子項', '活動內容', '存貨代碼清單', '適用範圍', '適用門市', '開始日期', '結束日期', '標示', '原始列範圍'];

    function textFor(item) {
      return fields.map(field => item[field] || '').join(' ').toLowerCase();
    }

    function matches(item) {
      const queryOk = !state.query || textFor(item).includes(state.query);
      const statusOk = state.status === 'all' || item.statusKind === state.status;
      return queryOk && statusOk;
    }

    function countsFor(items) {
      const changed = items.filter(item => item.statusKind === 'changed').length;
      const added = items.filter(item => item.statusKind === 'new').length;
      const long = items.filter(item => item.statusKind === 'long').length;
      const stock = items.filter(item => item.statusKind === 'stock').length;
      return { total: items.length, added, changed, long, stock };
    }

    function renderOverview(items) {
      const counts = countsFor(items);
      document.getElementById('overview').innerHTML = `
        <div class="metric"><strong>${counts.total}</strong><span>目前顯示活動</span></div>
        <div class="metric"><strong>${counts.added}</strong><span>6月新增項目</span></div>
        <div class="metric"><strong>${counts.changed}</strong><span>紅字+黃底異動重點</span></div>
        <div class="metric"><strong>${counts.long}</strong><span>長期 / 持續活動</span></div>
      `;
    }

    function renderNav(items) {
      const html = GROUPS
        .map(group => {
          const count = items.filter(item => item.group === group.id).length;
          if (!count) return '';
          return `<a class="group-chip" href="#group-${group.id}" style="--chip-color:${group.accent}">${group.title} <b>${count}</b></a>`;
        })
        .join('');
      document.getElementById('groupNav').innerHTML = html;
    }

    function esc(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function card(item) {
      const group = groupById[item.group];
      const badgeClass = item.statusKind === 'normal' ? '' : item.statusKind;
      const title = item['活動/子項'] || item['項目'] || item['大類'];
      const itemLabel = item['項目'] && item['項目'] !== title ? item['項目'] : item['大類'];
      const compact = state.density === 'compact';
      return `
        <article class="activity-card ${item.isNew ? 'new-item' : ''}" style="--group-color:${group.accent}">
          <div class="card-head">
            <h3 class="card-title">${esc(title)}</h3>
            <span class="badge ${badgeClass}">${esc(item.statusLabel)}</span>
          </div>
          <div class="subline">${esc(itemLabel)} · 原始列 ${esc(item['原始列範圍'])}</div>
          <p class="content">${esc(compact ? item.summaryCompact : item.summary)}</p>
          <div class="fields">
            <div class="field"><span class="label">期間</span><span class="value">${esc(item['開始日期'] || '未填')} → ${esc(item['結束日期'] || '未填')}</span></div>
            <div class="field"><span class="label">門市</span><span class="value">${esc(item.storesDisplay)}</span></div>
            <div class="field wide"><span class="label">適用範圍</span><span class="value">${esc(item.scopeDisplay)}</span></div>
            <div class="field wide"><span class="label">存貨代碼</span><span class="value">${esc(compact ? item.codesCompact : item.codesDisplay)}</span></div>
          </div>
        </article>
      `;
    }

    function renderGroups(items) {
      const html = GROUPS.map(group => {
        const groupItems = items.filter(item => item.group === group.id);
        if (!groupItems.length) return '';
        return `
          <section class="group" id="group-${group.id}" style="--group-color:${group.accent}">
            <div class="group-head">
              <div class="group-title">
                <h2>${group.title}</h2>
                <span>${groupItems.length} 筆活動</span>
              </div>
            </div>
            <div class="cards">${groupItems.map(card).join('')}</div>
          </section>
        `;
      }).join('');
      document.getElementById('groups').innerHTML = html;
      document.getElementById('emptyState').classList.toggle('hidden', items.length > 0);
    }

    function render() {
      const items = ACTIVITIES.filter(matches);
      renderOverview(items);
      renderNav(items);
      renderGroups(items);
    }

    document.getElementById('searchInput').addEventListener('input', event => {
      state.query = event.target.value.trim().toLowerCase();
      render();
    });

    document.getElementById('statusFilters').addEventListener('click', event => {
      const button = event.target.closest('button[data-status]');
      if (!button) return;
      state.status = button.dataset.status;
      document.querySelectorAll('#statusFilters .segment').forEach(btn => btn.classList.toggle('active', btn === button));
      render();
    });

    document.getElementById('densityFilters').addEventListener('click', event => {
      const button = event.target.closest('button[data-density]');
      if (!button) return;
      state.density = button.dataset.density;
      document.querySelectorAll('#densityFilters .segment').forEach(btn => btn.classList.toggle('active', btn === button));
      render();
    });

    render();
  </script>
