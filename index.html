<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>工作工具</title>
  <style>
    :root {
      --ink: #15191f;
      --muted: #647080;
      --line: #d9e1ea;
      --panel: #ffffff;
      --bg: #f4f7fa;
      --label: #d8f000;
      --transfer: #1f5f99;
      --shadow: 0 20px 60px rgba(21, 25, 31, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(31, 95, 153, .06) 1px, transparent 1px),
        linear-gradient(0deg, rgba(31, 95, 153, .05) 1px, transparent 1px),
        var(--bg);
      background-size: 36px 36px;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    main {
      width: min(1040px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 2px solid var(--ink);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 76px);
      line-height: .95;
      letter-spacing: 0;
      font-weight: 900;
    }

    .stamp {
      min-width: 150px;
      padding: 10px 12px;
      background: var(--panel);
      border: 2px solid var(--ink);
      box-shadow: 5px 5px 0 var(--ink);
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .tools {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .tool-card {
      display: grid;
      min-height: 280px;
      padding: 22px;
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      text-decoration: none;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .tool-card:hover {
      transform: translateY(-3px);
      border-color: var(--ink);
      box-shadow: 0 24px 70px rgba(21, 25, 31, .16);
    }

    .tool-card strong {
      align-self: start;
      display: inline-flex;
      width: fit-content;
      min-height: 34px;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
    }

    .tool-card h2 {
      align-self: end;
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1;
      letter-spacing: 0;
    }

    .tool-card p {
      align-self: end;
      margin: 0;
      max-width: 28rem;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      font-weight: 650;
    }

    .tool-card.label strong {
      color: #111500;
      background: var(--label);
    }

    .tool-card.transfer strong {
      color: #fff;
      background: var(--transfer);
    }

    .tool-card.label {
      background:
        linear-gradient(135deg, rgba(216, 240, 0, .22), transparent 44%),
        var(--panel);
    }

    .tool-card.transfer {
      background:
        linear-gradient(135deg, rgba(31, 95, 153, .18), transparent 44%),
        var(--panel);
    }

    footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 760px) {
      main {
        padding: 28px 0;
      }

      header,
      .tools {
        grid-template-columns: 1fr;
      }

      .tool-card {
        min-height: 210px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>工作工具</h1>
      <div class="stamp">
        <strong>samfor-work</strong><br>
        Store Toolkit
      </div>
    </header>

    <section class="tools" aria-label="工具列表">
      <a class="tool-card label" href="label.html">
        <strong>Label</strong>
        <div>
          <h2>標籤製作</h2>
          <p>上傳 Excel 產生列印標籤，支援 iPad、iPhone、Apple Watch。</p>
        </div>
      </a>

      <a class="tool-card transfer" href="transfer.html">
        <strong>Transfer</strong>
        <div>
          <h2>調撥工具</h2>
          <p>上傳存貨彙總，選擇本店門市，產生調撥計畫與建議清單。</p>
        </div>
      </a>
    </section>

    <footer>靜態網頁工具，所有 Excel 分析都在瀏覽器內執行。</footer>
  </main>
</body>
</html>
